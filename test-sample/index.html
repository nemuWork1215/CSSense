<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>CssExtend テスト</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <header class="site-header">
    <nav class="global-nav">
      <ul class="nav-list">
        <li class="nav-item active"><a href="#" class="nav-link">ホーム</a></li>
        <li class="nav-item"><a href="#" class="nav-link">About</a></li>
        <li class="nav-item"><a href="#" class="nav-link">Contact</a></li>
      </ul>
    </nav>
  </header>

  <main id="main-content">
    <section class="hero">
      <h1 class="hero-title">見出しテキスト</h1>
      <p class="hero-description">説明文がここに入ります。</p>
      <button class="btn btn-primary">詳細を見る</button>
    </section>

    <section class="card-list">
      <article class="card" id="card-1">
        <img class="card-image" src="" alt="">
        <div class="card-body">
          <h2 class="card-title">カードタイトル 1</h2>
          <p class="card-text">カードの本文テキストです。</p>
          <a href="#" class="card-link">続きを読む</a>
        </div>
      </article>

      <article class="card" id="card-2">
        <div class="card-body">
          <h2 class="card-title">カードタイトル 2</h2>
          <p class="card-text">カードの本文テキストです。</p>
          <span class="tag">新着</span>
          <span class="tag tag-important">重要</span>
        </div>
      </article>
    </section>
  </main>

  <aside id="sidebar">
    <div class="widget">
      <h3 class="widget-title">カテゴリ</h3>
      <ul class="widget-list">
        <li class="widget-item">Tech</li>
        <li class="widget-item">Design</li>
      </ul>
    </div>
  </aside>

  <footer class="site-footer">
    <p class="copyright">&copy; 2026 Antigravity</p>
  </footer>

</body>
</html>
